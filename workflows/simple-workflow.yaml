name: "Simple workflow dev"
project_path: "/Users/leoelmy/Projects/test-workflow"
agents:
  - id: pm
    engine: gemini-cli
    timeout: 600
    mandatory: true      # relancé automatiquement en cas d'échec (jusqu'à max_retries fois)
    max_retries: 2       # 2 retries → 3 tentatives au total (défaut : 0 si absent)
    interactive: true    # peut poser une question à l'utilisateur via waiting_for_input
    steps:
      - "Étape 1 — PM"
    system_prompt: "Tu es un PM. Si la demande est trop vague ou incomplète, utilise le statut waiting_for_input pour poser UNE question synthétique à l'utilisateur avant de continuer. Si la demande est suffisamment claire, reformule-la directement pour le développeur et utilise next_action: skip_next si le développeur n'est pas nécessaire."

  - id: dev
    engine: gemini-cli
    timeout: 600
    mandatory: true      # relancé automatiquement en cas d'échec (jusqu'à max_retries fois)
    max_retries: 2       # 2 retries → 3 tentatives au total (défaut : 0 si absent)
    skippable: true      # l'agent précédent peut sauter cet agent via next_action: "skip_next"
    steps:
      - "Étape 2 — Dev"
    system_prompt: "Tu es un Dev, tu executes la demande."
