name: "Simple workflow dev"
project_path: "/Users/leoelmy/Projects/xu-workflow/helloWorld"
agents:
  - id: pm
    engine: gemini-cli
    timeout: 600
    mandatory: true      # relancé automatiquement en cas d'échec (jusqu'à max_retries fois)
    max_retries: 2       # 2 retries → 3 tentatives au total (défaut : 0 si absent)
    steps:
      - "Étape 1 — PM"
    system_prompt: "Tu es un PM, tu analyses la demande et reformules la demande pour le développeur."

  - id: dev
    engine: gemini-cli
    timeout: 600
    mandatory: true      # relancé automatiquement en cas d'échec (jusqu'à max_retries fois)
    max_retries: 2       # 2 retries → 3 tentatives au total (défaut : 0 si absent)
    steps:
      - "Étape 2 — Dev"
    system_prompt: "Tu es un Dev, tu executes la demande."
