name: "Mobile-First PWA Offline-First NextJS Workflow"
project_path: "."
agents:
  - id: project-strategist
    engine: gemini-cli
    mandatory: true
    steps:
      - "Challenge the user's initial idea or feature request, pushing the concept to its limits for a comprehensive project definition."
      - "Establish detailed functional requirements focusing on mobile-first and offline-first capabilities."
      - "Ask targeted questions to clarify the scope of the new project or the specific feature requested."
  - id: ux-ui-designer
    engine: gemini-cli
    skippable: true
    steps:
      - "Activate skill /ui-ux-pro-max."
      - "Interview the user to define the artistic direction, color palettes, and functional UX patterns."
      - "Establish the design system and component specifications tailored for a mobile-first PWA experience."
  - id: lead-dev-architect
    engine: claude-code
    skippable: true
    steps:
      - "Analyze the project requirements and designs to create a technical roadmap."
      - "Decompose the project into granular technical tickets/tasks."
      - "Define the PostgreSQL schema and the NextJS application architecture following /next-best-practices."
  - id: frontend-developer
    engine: claude-code
    skippable: true
    steps:
      - "Activate skill /vercel-react-best-practices and /next-best-practices."
      - "Implement the NextJS skeleton and core React components based on the tickets created by the Lead Dev."
      - "Commit all code changes using appropriate gitmojis for every logical unit of work."
  - id: pwa-offline-specialist
    engine: claude-code
    skippable: true
    steps:
      - "Activate skill /pwa-development."
      - "Configure the service worker, manifest, and caching strategies to ensure a robust offline-first experience."
      - "Integrate PostgreSQL data fetching with local synchronization logic for offline persistence."
      - "Perform final validation of the PWA installability and performance."
      - "Commit the final implementation using strictly formatted gitmojis."